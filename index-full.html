<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Minimal personal page for Ethan Byrne – connect with me on LinkedIn."
    />
    <title>Ethan Byrne • LinkedIn</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" aria-label="Ethan Byrne profile link">
      <a
        class="linkedin-link"
        href="https://www.linkedin.com/in/ethan-byrne-a1959a244"
        target="_blank"
        rel="noreferrer noopener"
      >
        Connect with me on LinkedIn
      </a>

      <section
        class="github-widget"
        aria-label="Recent GitHub commits"
        data-github-user="EthanByrne"
      >
        <h2 class="github-widget-title">Recent commits</h2>
        <ul class="github-commit-list" id="github-commits"></ul>
        <a
          class="github-widget-link"
          href="https://github.com/EthanByrne"
          target="_blank"
          rel="noreferrer noopener"
        >
          View on GitHub
        </a>
      </section>
    </main>
    <script src="github-widget.js"></script>
  </body>
</html>
